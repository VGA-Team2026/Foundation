# PRコンパイルチェックワークフロー
#
# PRの作成・更新時にUnityプロジェクトのコンパイルエラーをチェック
#
# 必要なGitHub Secrets:
#   - UNITY_EDITOR_PATH: Unityエディタのパス（必須）

name: PR Compile Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  compile-check:
    # Self-Hosted Runnerで実行
    runs-on: [self-hosted, PRCheck, Windows]

    steps:
    # リポジトリをチェックアウト
    - name: リポジトリのチェックアウト
      uses: actions/checkout@v4
      with:
        clean: false

    # Unity環境の検証
    - name: Unity環境の検証
      id: validate-unity
      shell: cmd
      run: |
        @echo off
        REM GitHub SecretsからUnityパスを取得
        set UNITY_PATH=${{ secrets.UNITY_EDITOR_PATH }}

        REM Unityパスが設定されているか確認
        if "%UNITY_PATH%"=="" (
          echo ❌ UNITY_EDITOR_PATH シークレットが設定されていません
          echo GitHub リポジトリの Settings ^> Secrets and variables ^> Actions で設定してください
          exit /b 1
        )

        REM Unityが指定パスに存在するか確認
        if not exist "%UNITY_PATH%" (
          echo ❌ Unityが見つかりません: %UNITY_PATH%
          echo UNITY_EDITOR_PATH シークレットを正しいパスに更新してください
          exit /b 1
        )

        echo ✅ Unity検証成功: %UNITY_PATH%
        echo UNITY_PATH=%UNITY_PATH% >> %GITHUB_OUTPUT%

    # Unityプロジェクトのコンパイル
    - name: Unityプロジェクトのコンパイル
      id: compile
      shell: cmd
      continue-on-error: true
      run: |
        @echo off
        set PROJECT_ROOT=${{ github.workspace }}
        set UNITY_PATH=${{ steps.validate-unity.outputs.UNITY_PATH }}
        set COMPILE_LOG=%PROJECT_ROOT%\compile.log
        cd unity

        echo コンパイルチェック開始...

        REM BuildScriptを使用してコンパイルチェック実行
        "%UNITY_PATH%" -batchmode -quit -projectPath . -executeMethod BuildScript.CompilePlayerScripts -logFile "%COMPILE_LOG%"
        set COMPILE_EXIT_CODE=%ERRORLEVEL%
        echo compile_exit_code=%COMPILE_EXIT_CODE% >> %GITHUB_OUTPUT%

        REM 終了コードで判定（0なら成功、それ以外は失敗）
        if %COMPILE_EXIT_CODE% neq 0 (
          echo has_errors=true >> %GITHUB_OUTPUT%
          echo ❌ コンパイル失敗 (終了コード: %COMPILE_EXIT_CODE%)
        ) else (
          echo has_errors=false >> %GITHUB_OUTPUT%
          echo ✅ コンパイル成功
        )

    # Node.jsでエラーログ解析
    - name: エラーログ解析
      id: parse-errors
      shell: cmd
      continue-on-error: true
      run: |
        @echo off
        set PROJECT_ROOT=${{ github.workspace }}
        set COMPILE_LOG=%PROJECT_ROOT%\compile.log
        set ERROR_SUMMARY=%PROJECT_ROOT%\compile-errors.md

        echo === コンパイルログ解析 ===

        REM Node.jsスクリプトでログを解析
        node "%PROJECT_ROOT%\.github\scripts\parse-compile-log.js" "%COMPILE_LOG%" "%ERROR_SUMMARY%"

    # エラーサマリをArtifactとしてアップロード
    - name: エラーサマリのアップロード
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: compile-errors
        path: |
          compile-errors.md
          compile.log
        if-no-files-found: ignore
        retention-days: 7

    # PRにコメント（エラー時のみ - フラグファイルで判定）
    - name: PRにエラーコメント
      if: always()
      shell: cmd
      run: |
        @echo off
        set PROJECT_ROOT=${{ github.workspace }}
        set ERROR_SUMMARY=%PROJECT_ROOT%\compile-errors.md
        set HAS_ERRORS_FLAG=%PROJECT_ROOT%\.has_compile_errors

        REM エラーフラグファイルが存在する場合のみコメント
        if exist "%HAS_ERRORS_FLAG%" (
          echo エラーが検出されました。PRにコメントを追加します...
          if exist "%ERROR_SUMMARY%" (
            gh pr comment ${{ github.event.number }} --body-file "%ERROR_SUMMARY%"
            echo ✅ PRにコメントを追加しました
          ) else (
            echo ⚠️ エラーサマリファイルが見つかりません
          )
        ) else (
          echo ✅ コンパイルエラーなし。PRコメントはスキップします。
        )
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 最終結果の判定（エラーフラグファイルで判定）
    - name: 結果判定
      if: always()
      shell: cmd
      run: |
        @echo off
        set PROJECT_ROOT=${{ github.workspace }}
        set HAS_ERRORS_FLAG=%PROJECT_ROOT%\.has_compile_errors

        if exist "%HAS_ERRORS_FLAG%" (
          echo ❌ コンパイルエラーが検出されました
          echo 詳細は Artifacts の compile-errors.md を確認してください
          exit /b 1
        ) else (
          echo ✅ コンパイル成功
        )
